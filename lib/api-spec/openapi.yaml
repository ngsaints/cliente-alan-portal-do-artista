openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: songs
    description: Song catalog
  - name: settings
    description: Artist settings
  - name: vip
    description: VIP area
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthStatus"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Admin logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthStatus"

  /auth/status:
    get:
      operationId: getAuthStatus
      tags: [auth]
      summary: Get auth status
      responses:
        "200":
          description: Auth status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthStatus"

  /songs:
    get:
      operationId: listSongs
      tags: [songs]
      summary: List all songs
      parameters:
        - name: genre
          in: query
          required: false
          schema:
            type: string
        - name: vip
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: List of songs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Song"

    post:
      operationId: createSong
      tags: [songs]
      summary: Add a new song (admin only)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [titulo, descricao, genero]
              properties:
                titulo:
                  type: string
                descricao:
                  type: string
                genero:
                  type: string
                subgenero:
                  type: string
                compositor:
                  type: string
                status:
                  type: string
                precoX:
                  type: string
                precoY:
                  type: string
                isVip:
                  type: string
                tipoMidia:
                  type: string
                youtubeUrl:
                  type: string
                vipCode:
                  type: string
                artistaId:
                  type: string
                capa:
                  type: string
                  format: binary
                mp3:
                  type: string
                  format: binary
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Song"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /songs/{id}:
    patch:
      operationId: updateSong
      tags: [songs]
      summary: Update a song's details (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSongBody"
      responses:
        "200":
          description: Updated song
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Song"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: deleteSong
      tags: [songs]
      summary: Delete a song (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get artist settings (public)
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtistSettings"

    put:
      operationId: updateSettings
      tags: [settings]
      summary: Update artist settings (admin only)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                artistName:
                  type: string
                vipPassword:
                  type: string
                photo:
                  type: string
                  format: binary
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtistSettings"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /vip/login:
    post:
      operationId: vipLogin
      tags: [vip]
      summary: VIP area login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VipLoginBody"
      responses:
        "200":
          description: VIP access granted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VipStatus"
        "401":
          description: Wrong password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /vip/status:
    get:
      operationId: getVipStatus
      tags: [vip]
      summary: Get VIP session status
      responses:
        "200":
          description: VIP status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VipStatus"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    LoginBody:
      type: object
      required: [usuario, senha]
      properties:
        usuario:
          type: string
        senha:
          type: string

    AuthStatus:
      type: object
      required: [logado]
      properties:
        logado:
          type: boolean

    VipLoginBody:
      type: object
      required: [senha]
      properties:
        senha:
          type: string

    VipStatus:
      type: object
      required: [vipLogado]
      properties:
        vipLogado:
          type: boolean

    ArtistSettings:
      type: object
      required: [artistName]
      properties:
        artistName:
          type: string
        artistPhotoUrl:
          type: ["string", "null"]

    UpdateSongBody:
      type: object
      properties:
        titulo:
          type: string
        descricao:
          type: string
        genero:
          type: string
        subgenero:
          type: ["string", "null"]
        compositor:
          type: ["string", "null"]
        status:
          type: string
        precoX:
          type: ["string", "null"]
        precoY:
          type: ["string", "null"]
        isVip:
          type: boolean
        tipoMidia:
          type: string
        youtubeUrl:
          type: ["string", "null"]
        vipCode:
          type: ["string", "null"]

    Song:
      type: object
      required: [id, titulo, descricao, genero, status, isVip, createdAt]
      properties:
        id:
          type: integer
        titulo:
          type: string
        descricao:
          type: string
        genero:
          type: string
        subgenero:
          type: ["string", "null"]
        compositor:
          type: ["string", "null"]
        status:
          type: string
        precoX:
          type: ["string", "null"]
        precoY:
          type: ["string", "null"]
        isVip:
          type: boolean
        capaUrl:
          type: ["string", "null"]
        mp3Url:
          type: ["string", "null"]
        tipoMidia:
          type: string
        youtubeUrl:
          type: ["string", "null"]
        vipCode:
          type: ["string", "null"]
        artistaId:
          type: ["string", "null"]
        likes:
          type: string
        plays:
          type: string
        createdAt:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
