openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: songs
    description: Song catalog
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthStatus"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Admin logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthStatus"

  /auth/status:
    get:
      operationId: getAuthStatus
      tags: [auth]
      summary: Get auth status
      responses:
        "200":
          description: Auth status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthStatus"

  /songs:
    get:
      operationId: listSongs
      tags: [songs]
      summary: List all songs
      parameters:
        - name: genre
          in: query
          required: false
          schema:
            type: string
        - name: vip
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: List of songs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Song"

    post:
      operationId: createSong
      tags: [songs]
      summary: Add a new song (admin only)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [titulo, descricao, genero]
              properties:
                titulo:
                  type: string
                descricao:
                  type: string
                genero:
                  type: string
                isVip:
                  type: string
                capa:
                  type: string
                  format: binary
                mp3:
                  type: string
                  format: binary
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Song"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /songs/{id}:
    delete:
      operationId: deleteSong
      tags: [songs]
      summary: Delete a song (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    LoginBody:
      type: object
      required: [usuario, senha]
      properties:
        usuario:
          type: string
        senha:
          type: string

    AuthStatus:
      type: object
      required: [logado]
      properties:
        logado:
          type: boolean

    Song:
      type: object
      required: [id, titulo, descricao, genero, isVip, createdAt]
      properties:
        id:
          type: integer
        titulo:
          type: string
        descricao:
          type: string
        genero:
          type: string
        isVip:
          type: boolean
        capaUrl:
          type: ["string", "null"]
        mp3Url:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
